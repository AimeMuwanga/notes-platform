services:
  # 1. THE SHARED DATABASE
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. THE SHARED CACHE
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 3. AUTH SERVICE
  auth-api:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/authdb
      - JWT_SECRET=supersecretjwtkey
      - JWT_EXPIRES_IN=1h
      - PORT=3001

  auth-migrate:
    build: ./services/auth-service
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/authdb

  # 4. NOTES SERVICE
  notes-api:
    build: ./services/notes-service
    ports:
      - "3002:3002"
    depends_on:
      auth-api:
        condition: service_started
      notes-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/notesdb
      - JWT_SECRET=supersecretjwtkey
      - REDIS_URL=redis://redis:6379
      - PORT=3002

  notes-migrate:
    build: ./services/notes-service
    command: ["npm", "run", "migrate"]
    depends_on:
      notes-db-init:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/notesdb

  notes-db-init:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        psql postgres://postgres:postgres@postgres:5432/postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'notesdb'" | grep -q 1 || psql postgres://postgres:postgres@postgres:5432/postgres -c "CREATE DATABASE notesdb"

volumes:
  pgdata:
